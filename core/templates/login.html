<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>เข้าสู่ระบบ</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg,#1f4e79,#4e73df);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}
.card {
    border-radius:20px;
}
</style>
</head>

<body id="body">

<div class="card p-4 shadow-lg" style="width:380px;">
    <div class="text-center mb-3">
        <h4>P.F.P. Design And Construct Co., Ltd.</h4>
    </div>

    <form method="post">
        {% csrf_token %}
        <input class="form-control mb-3" name="username" placeholder="ชื่อผู้ใช้">
        <input type="password" class="form-control mb-3"
               name="password" placeholder="รหัสผ่าน">
        <button class="btn btn-primary w-100">เข้าสู่ระบบ</button>
    </form>
</div>

</body>
</html>
